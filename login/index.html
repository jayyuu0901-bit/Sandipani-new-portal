<script src="https://cdn.tailwindcss.com"></script>

<main class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Login</h2>
    
    <form class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email/ID</label>
        <input type="text" class="w-full mt-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" class="w-full mt-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition mt-2">
        Sign In
      </button>
    </form>
    
    <div class="mt-4 text-center">
      <a href="/" class="text-sm text-blue-500 hover:underline">Back to Home</a>
    </div>
  </div>
</main>
