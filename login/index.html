
<script src="https://cdn.tailwindcss.com"></script>

<main class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-6">
  <!-- Top Identity -->
  <div class="text-center mb-6">
    <div class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg">
      <span class="text-xl font-bold">S</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Sandipani Portal</h1>
    <p class="text-gray-500 text-sm">Secure access for students & staff</p>
  </div>

  <!-- Login Card Box -->
  <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-200">
    <div class="mb-6">
      <h2 class="text-lg font-bold text-gray-800">Welcome Back</h2>
      <p class="text-gray-500 text-xs">Enter your credentials to continue</p>
    </div>
    
    <form class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Email or Student ID</label>
        <input type="text" placeholder="e.g. 2026001" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Password</label>
        <input type="password" placeholder="••••••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg mt-2">
        Access Portal
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="/" class="text-blue-600 font-semibold hover:underline text-sm">← Back to Home</a>
    </div>
  </div>

  <!-- Footer -->
  <p class="mt-8 text-gray-400 text-[10px] uppercase tracking-widest">© 2026 Sandipani School Official</p>
</main>
